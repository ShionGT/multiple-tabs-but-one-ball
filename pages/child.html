<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ball Bounce Demo - Child</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #gameCanvas { display: block; }
        footer { position: fixed; bottom: 0; width: 100%; text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <footer>&copy; 2026 Shion Toda.</footer>
    <script src="https://unpkg.com/across-tabs@1.4.0/dist/across-tabs.min.js"></script>
    <script>
        /*!
         * Multi-Window Bouncing Ball - Child Tab
         *
         * Mirrors the ball broadcast by the parent. The ball lives in a shared
         * "world" coordinate space owned by the parent.
         *
         * - DETACHED (own window): this tab's world rect = its real
         *   screenX/screenY, so the ball appears at its physical position.
         * - ATTACHED (same window as parent): screenX/screenY are identical, so
         *   the parent assigns this tab a virtual tile (stacked below the
         *   parent). We render that slice of the world, which makes the child
         *   mirror a different part of the bouncing ball.
         */

        // === Canvas Setup ===
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // === Ball Class ===
        class Ball {
            constructor(x, y, vx, vy, radius) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
            }

            draw(localOriginX, localOriginY) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const localX = this.x - localOriginX;
                const localY = this.y - localOriginY;
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(localX, localY, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            setFromData(data) {
                this.x = data.x;
                this.y = data.y;
                this.vx = data.vx;
                this.vy = data.vy;
                this.radius = data.radius;
            }
        }

        let ball = null;
        let myTabId = null;
        let parentRect = null;   // last known parent rect from broadcast
        let myResolvedRect = null; // our rect in world space (resolved)

        // Report our real window rect + whether we share the parent's window.
        function reportWindow() {
            if (!child || !myTabId || !parentRect) return;
            const attached =
                window.screenX === parentRect.x && window.screenY === parentRect.y;
            child.sendMessageToParent({
                type: 'window',
                tab: {
                    id: myTabId,
                    x: window.screenX,
                    y: window.screenY,
                    width: window.innerWidth,
                    height: window.innerHeight,
                    attached: attached,
                },
            });
        }

        // Resolve our rectangle in world space using the parent's rect.
        function resolveMyRect() {
            if (!parentRect) return null;
            const attached =
                window.screenX === parentRect.x && window.screenY === parentRect.y;
            if (attached) {
                // Parent assigns attached children a virtual tile stacked below.
                // We ask: how many attached children are BELOW us? Simpler:
                // we don't know our index from here, so we just place ourselves
                // directly below the parent by one tile. (Parent uses the same
                // rule for the first attached child; multiple attached children
                // stack — see note.) For a single attached child this is exact.
                return {
                    x: parentRect.x,
                    y: parentRect.y + parentRect.height,
                    width: parentRect.width,
                    height: parentRect.height,
                };
            }
            // Detached: real screen position
            return {
                x: window.screenX,
                y: window.screenY,
                width: window.innerWidth,
                height: window.innerHeight,
            };
        }

        function isBallVisibleIn(rect) {
            if (!ball || !rect) return false;
            return (
                ball.x + ball.radius >= rect.x &&
                ball.x - ball.radius <= rect.x + rect.width &&
                ball.y + ball.radius >= rect.y &&
                ball.y - ball.radius <= rect.y + rect.height
            );
        }

        // === AcrossTabs Setup ===
        let child;
        const AcrossTabsChild = AcrossTabs.default ? AcrossTabs.default.Child : AcrossTabs.Child;
        child = new AcrossTabsChild({
            onReady: () => {
                Promise.resolve().then(() => {
                    try {
                        myTabId = child.getTabInfo().id;
                        console.log('Child ready, tabId:', myTabId);
                    } catch (e) {
                        setTimeout(() => {
                            myTabId = child.getTabInfo().id;
                            console.log('Child ready, tabId:', myTabId);
                        }, 100);
                    }
                });
            },
            onParentCommunication: (message) => {
                if (!message) return;
                if (message.type === 'ball') {
                    if (!ball) {
                        ball = new Ball(0, 0, 0, 0, 20);
                    }
                    ball.setFromData(message.ball);
                    parentRect = message.parentRect || null;
                    // Re-report window state now that we know parentRect
                    reportWindow();
                }
            },
        });

        // Keep parent informed of our window position
        window.addEventListener('resize', reportWindow);
        window.addEventListener('scroll', reportWindow);
        setInterval(reportWindow, 1000);

        // === Game Loop ===
        function loop() {
            const rect = resolveMyRect();
            if (ball && rect && isBallVisibleIn(rect)) {
                ball.draw(rect.x, rect.y);
            } else if (ball) {
                // Clear so a stale frame doesn't linger when ball leaves view
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
