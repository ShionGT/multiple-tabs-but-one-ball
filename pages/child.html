<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ball Bounce Demo - Child</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #gameCanvas { display: block; }
        footer { position: fixed; bottom: 0; width: 100%; text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <footer>&copy; 2026 Shion Toda.</footer>
    <script src="https://unpkg.com/across-tabs@1.4.0/dist/across-tabs.min.js"></script>
    <script>
        /*!
         * Multi-Window Bouncing Ball - Child Tab
         *
         * The parent owns the simulation and broadcasts the ball position plus
         * the list of all tab rectangles. The child simply renders the ball at
         * its real screen-space position whenever it falls within this tab's
         * own screen rectangle.
         *
         * No virtual tiles. No attached/detached distinction. The ball moves
         * in real screen coordinates and each tab shows it when it's inside
         * that tab's screen area.
         */

        // === Canvas Setup ===
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // === Ball Class ===
        class Ball {
            constructor(x, y, vx, vy, radius) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
            }

            draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const localX = this.x - window.screenX;
                const localY = this.y - window.screenY;
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(localX, localY, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            setFromData(data) {
                this.x = data.x;
                this.y = data.y;
                this.vx = data.vx;
                this.vy = data.vy;
                this.radius = data.radius;
            }
        }

        let ball = null;
        let myTabId = null;

        // Report our real window rect to the parent
        function reportWindow() {
            if (!child || !myTabId) return;
            child.sendMessageToParent({
                type: 'window',
                tab: {
                    id: myTabId,
                    x: window.screenX,
                    y: window.screenY,
                    width: window.innerWidth,
                    height: window.innerHeight,
                },
            });
        }

        // === AcrossTabs Setup ===
        let child;
        const AcrossTabsChild = AcrossTabs.default ? AcrossTabs.default.Child : AcrossTabs.Child;
        child = new AcrossTabsChild({
            onReady: () => {
                Promise.resolve().then(() => {
                    try {
                        myTabId = child.getTabInfo().id;
                        console.log('Child ready, tabId:', myTabId);
                        reportWindow();
                    } catch (e) {
                        setTimeout(() => {
                            myTabId = child.getTabInfo().id;
                            console.log('Child ready, tabId:', myTabId);
                            reportWindow();
                        }, 100);
                    }
                });
            },
            onParentCommunication: (message) => {
                if (!message) return;
                if (message.type === 'ball') {
                    if (!ball) {
                        console.error('Received ball data before ball was initialized');
                        ball = new Ball(0, 0, 0, 0, 20);
                    }
                    ball.setFromData(message.ball);
                    reportWindow();
                }
                loop();
            },
        });

        // Keep parent informed of our window position
        window.addEventListener('resize', reportWindow);
        setInterval(reportWindow, 1000);

        // === Game Loop ===
        function loop() {
            if (ball) {
                ball.draw();
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
