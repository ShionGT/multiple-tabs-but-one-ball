<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ball Bounce Demo - Child</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #gameCanvas { display: block; }
        footer { position: fixed; bottom: 0; width: 100%; text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <footer>&copy; 2026 Shion Toda.</footer>
    <script src="https://unpkg.com/across-tabs@1.4.0/dist/across-tabs.min.js"></script>
    <script>
        /*!
         * Multi-Window Bouncing Ball - Child Tab
         * Mirrors the ball position broadcast by the parent.
         * Draws the ball whenever it is within this tab's viewport.
         * Works whether tabs are overlapping or detached.
         */

        // === Canvas Setup ===
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // === Ball Class ===
        class Ball {
            constructor(x, y, vx, vy, radius) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
            }

            draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const localX = this.x - window.screenX;
                const localY = this.y - window.screenY;
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(localX, localY, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            setFromData(data) {
                this.x = data.x;
                this.y = data.y;
                this.vx = data.vx;
                this.vy = data.vy;
                this.radius = data.radius;
            }
        }

        let ball = null;
        let myTabId = null;

        function isBallVisible() {
            if (!ball) return false;
            const left = window.screenX;
            const right = left + window.innerWidth;
            const top = window.screenY;
            const bottom = top + window.innerHeight;
            return (
                ball.x + ball.radius >= left &&
                ball.x - ball.radius <= right &&
                ball.y + ball.radius >= top &&
                ball.y - ball.radius <= bottom
            );
        }

        // === AcrossTabs Setup ===
        // onReady fires synchronously inside the constructor, so we cannot
        // reference `child` there (temporal dead zone). We capture the
        // instance via a deferred microtask instead.
        let child;
        const AcrossTabsChild = AcrossTabs.default ? AcrossTabs.default.Child : AcrossTabs.Child;
        child = new AcrossTabsChild({
            onReady: () => {
                // Defer to escape the TDZ — `child` is assigned by now
                Promise.resolve().then(() => {
                    try {
                        myTabId = child.getTabInfo().id;
                        console.log('Child ready, tabId:', myTabId);
                    } catch (e) {
                        // getTabInfo may not be ready yet; retry shortly
                        setTimeout(() => {
                            myTabId = child.getTabInfo().id;
                            console.log('Child ready, tabId:', myTabId);
                        }, 100);
                    }
                });
            },
            onParentCommunication: (message) => {
                if (!message) return;
                if (message.type === 'ball') {
                    if (!ball) {
                        ball = new Ball(0, 0, 0, 0, 20);
                    }
                    ball.setFromData(message.ball);
                }
            },
        });

        // === Game Loop ===
        function loop() {
            if (ball && isBallVisible()) {
                ball.draw();
            }
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
