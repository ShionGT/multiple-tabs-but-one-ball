<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ball Bounce Demo</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #gameCanvas { display: block; }
        #createTabButton { position: fixed; top: 10px; left: 10px; z-index: 100; padding: 8px 16px; border-radius: 10px; background: #178ded; color: #ffffff; border: none; cursor: pointer; font-family: sans-serif; text-transform: uppercase; }
        footer { position: fixed; bottom: 0; width: 100%; text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <button id="createTabButton">Create New Tab</button>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <footer>&copy; 2026 Shion Toda.</footer>
    <script src="https://unpkg.com/across-tabs@1.4.0/dist/across-tabs.min.js"></script>
    <script>
        /*!
         * Multi-Window Bouncing Ball - Parent Tab
         *
         * Collision model: each tab is a rectangle in screen space. The ball
         * bounces inside whatever tab it's currently in, BUT an edge is
         * "open" (ball passes through) if another tab's rectangle touches or
         * overlaps that edge. If no other tab is adjacent on that side, the
         * ball bounces off.
         *
         * Tabs in the same browser window share the same screenX/screenY, so
         * they fully overlap → all edges are open → ball passes through.
         * Tabs in separate windows placed side by side on screen → ball
         * passes through the touching edges, bounces on the outer edges.
         * Tabs far apart → ball bounces inside whichever tab it's in.
         */

        // === Canvas Setup ===
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // === Ball Class ===
        class Ball {
            constructor(x, y, vx, vy, radius) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
            }

            // Per-edge collision with tab adjacency detection.
            // tabs: array of {x, y, w, h} rectangles in screen space.
            // The ball must stay inside whichever tab it's in; an edge bounces
            // only if no other tab touches that edge.
            update(tabRects) {
                this.x += this.vx;
                this.y += this.vy;

                // Find which tab the ball center is currently inside
                let currentTab = null;
                for (const t of tabRects) {
                    if (this.x >= t.x && this.x <= t.x + t.w &&
                        this.y >= t.y && this.y <= t.y + t.h) {
                        currentTab = t;
                        break;
                    }
                }
                // If not clearly inside any tab, find the closest one
                if (!currentTab && tabRects.length > 0) {
                    let minDist = Infinity;
                    for (const t of tabRects) {
                        const cx = t.x + t.w / 2;
                        const cy = t.y + t.h / 2;
                        const d = Math.hypot(this.x - cx, this.y - cy);
                        if (d < minDist) { minDist = d; currentTab = t; }
                    }
                }
                if (!currentTab) return;

                // For each of the 4 edges of currentTab, check if any OTHER
                // tab touches/overlaps that edge. If so → open (pass through).
                const others = tabRects.filter(t => t !== currentTab);

                // LEFT edge
                if (this.x - this.radius < currentTab.x) {
                    const open = others.some(t => this._edgesTouchLeft(currentTab, t));
                    if (open) {
                        // pass through — clamp to just inside so we don't lose the ball
                        this.x = currentTab.x + this.radius;
                    } else {
                        this.x = currentTab.x + this.radius;
                        this.vx *= -1;
                    }
                }
                // RIGHT edge
                if (this.x + this.radius > currentTab.x + currentTab.w) {
                    const open = others.some(t => this._edgesTouchRight(currentTab, t));
                    if (open) {
                        this.x = currentTab.x + currentTab.w - this.radius;
                    } else {
                        this.x = currentTab.x + currentTab.w - this.radius;
                        this.vx *= -1;
                    }
                }
                // TOP edge
                if (this.y - this.radius < currentTab.y) {
                    const open = others.some(t => this._edgesTouchTop(currentTab, t));
                    if (open) {
                        this.y = currentTab.y + this.radius;
                    } else {
                        this.y = currentTab.y + this.radius;
                        this.vy *= -1;
                    }
                }
                // BOTTOM edge
                if (this.y + this.radius > currentTab.y + currentTab.h) {
                    const open = others.some(t => this._edgesTouchBottom(currentTab, t));
                    if (open) {
                        this.y = currentTab.y + currentTab.h - this.radius;
                    } else {
                        this.y = currentTab.y + currentTab.h - this.radius;
                        this.vy *= -1;
                    }
                }
            }

            // Edge-touch detection: does tab `other` touch the LEFT edge of `cur`?
            // Left edge of cur is the line x = cur.x, from cur.y to cur.y+cur.h
            _edgesTouchLeft(cur, other) {
                return other.x + other.w >= cur.x - 2 && other.x <= cur.x + 2 &&
                       other.y < cur.y + cur.h && other.y + other.h > cur.y;
            }
            _edgesTouchRight(cur, other) {
                return other.x <= cur.x + cur.w + 2 && other.x >= cur.x + cur.w - 2 &&
                       other.y < cur.y + cur.h && other.y + other.h > cur.y;
            }
            _edgesTouchTop(cur, other) {
                return other.y + other.h >= cur.y - 2 && other.y <= cur.y + 2 &&
                       other.x < cur.x + cur.w && other.x + other.w > cur.x;
            }
            _edgesTouchBottom(cur, other) {
                return other.y <= cur.y + cur.h + 2 && other.y >= cur.y + cur.h - 2 &&
                       other.x < cur.x + cur.w && other.x + other.w > cur.x;
            }

            draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const localX = this.x - window.screenX;
                const localY = this.y - window.screenY;
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(localX, localY, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // === Tab Tracking ===
        const TAB_ID = 'parent-' + Math.random().toString(36).slice(2, 11);
        // tabs[id] = { id, x, y, width, height }
        const tabs = {};

        function getMyTab() {
            return {
                id: TAB_ID,
                x: window.screenX,
                y: window.screenY,
                width: window.innerWidth,
                height: window.innerHeight,
            };
        }

        // Build array of {x, y, w, h} rectangles for all known tabs
        function getTabRects() {
            return Object.values(tabs).map(t => ({
                x: t.x, y: t.y, w: t.width, h: t.height,
            }));
        }

        // === Ball Initialization - guaranteed non-zero velocity ===
        function makeVelocity() {
            let vx, vy;
            do {
                vx = (Math.random() - 0.5) * 12;
                vy = (Math.random() - 0.5) * 12;
            } while (Math.abs(vx) < 3 || Math.abs(vy) < 3);
            return { vx, vy };
        }
        const vel = makeVelocity();
        const ball = new Ball(
            window.screenX + window.innerWidth / 2,
            window.screenY + window.innerHeight / 2,
            vel.vx,
            vel.vy,
            20
        );

        // === AcrossTabs Setup ===
        const AcrossTabsParent = AcrossTabs.default ? AcrossTabs.default.Parent : AcrossTabs.Parent;
        const tabManager = new AcrossTabsParent({
            onReady: () => console.log('Parent ready, tabId:', TAB_ID),
            onChildCommunication: (message, tabInfo) => {
                if (!message) return;
                if (message.type === 'window') {
                    tabs[message.tab.id] = message.tab;
                }
            },
        });

        document.getElementById('createTabButton').addEventListener('click', () => {
            tabManager.openNewTab({ url: 'pages/child.html' });
        });

        // === Game Loop ===
        function loop() {
            tabs[TAB_ID] = getMyTab();
            const rects = getTabRects();
            ball.update(rects);
            ball.draw();

            // Broadcast ball + all tab rects to children
            tabManager.broadCastAll({
                type: 'ball',
                ball: { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy, radius: ball.radius },
                tabs: Object.values(tabs).map(t => ({
                    id: t.id, x: t.x, y: t.y, w: t.width, h: t.height,
                })),
            });

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
