<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ball Bounce Demo</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #gameCanvas { display: block; }
        #createTabButton { position: fixed; top: 10px; left: 10px; z-index: 100; padding: 8px 16px; border-radius: 10px; background: #178ded; color: #ffffff; border: none; cursor: pointer; font-family: sans-serif; text-transform: uppercase; }
        footer { position: fixed; bottom: 0; width: 100%; text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <button id="createTabButton">Create New Tab</button>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <footer>&copy; 2026 Shion Toda.</footer>
    <script src="https://unpkg.com/across-tabs@1.4.0/dist/across-tabs.min.js"></script>
    <script>
        /*!
         * Multi-Window Bouncing Ball - Parent Tab
         *
         * The parent owns the ball simulation. It tracks every tab (itself +
         * children) as a rectangle in a shared "world" coordinate space and
         * bounces the ball inside the union of all rectangles.
         *
         * When a child is ATTACHED in the same browser window it shares the
         * parent's screenX/screenY, so we give it a virtual tile offset
         * (stacked below the parent) so the world bounds actually grow and
         * the child mirrors a different slice of the world.
         */

        // === Canvas Setup ===
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // === Ball Class ===
        class Ball {
            constructor(x, y, vx, vy, radius) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = radius;
            }

            update(bounds) {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x - this.radius < bounds.left) {
                    this.x = bounds.left + this.radius;
                    this.vx *= -1;
                }
                if (this.x + this.radius > bounds.right) {
                    this.x = bounds.right - this.radius;
                    this.vx *= -1;
                }
                if (this.y - this.radius < bounds.top) {
                    this.y = bounds.top + this.radius;
                    this.vy *= -1;
                }
                if (this.y + this.radius > bounds.bottom) {
                    this.y = bounds.bottom - this.radius;
                    this.vy *= -1;
                }
            }

            draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const localX = this.x - window.screenX;
                const localY = this.y - window.screenY;
                ctx.fillStyle = 'red';
                ctx.beginPath();
                ctx.arc(localX, localY, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // === Tab / World Tracking ===
        const TAB_ID = 'parent-' + Math.random().toString(36).slice(2, 11);

        // tabs[id] = { id, x, y, width, height, attached }
        const tabs = {};

        function getMyTab() {
            return {
                id: TAB_ID,
                x: window.screenX,
                y: window.screenY,
                width: window.innerWidth,
                height: window.innerHeight,
                attached: false, // parent is never "attached"
            };
        }

        // Compute the parent's own rectangle in world space.
        function getParentRect() {
            return getMyTab();
        }

        // Given the parent rect and the list of child tabs, assign each
        // attached child a virtual tile so the world actually grows.
        // Attached children are stacked vertically below the parent.
        function resolveChildRects(parentRect) {
            const resolved = {};
            let cursorY = parentRect.y + parentRect.height; // stack below parent
            for (const tab of Object.values(tabs)) {
                if (tab.id === TAB_ID) continue;
                if (tab.attached) {
                    resolved[tab.id] = {
                        id: tab.id,
                        x: parentRect.x,
                        y: cursorY,
                        width: parentRect.width,
                        height: parentRect.height,
                        attached: true,
                    };
                    cursorY += parentRect.height;
                } else {
                    // Detached: use its real screen position
                    resolved[tab.id] = {
                        id: tab.id,
                        x: tab.x,
                        y: tab.y,
                        width: tab.width,
                        height: tab.height,
                        attached: false,
                    };
                }
            }
            return resolved;
        }

        function getWorldBounds() {
            const parentRect = getParentRect();
            const childRects = resolveChildRects(parentRect);
            const all = [parentRect, ...Object.values(childRects)];

            let left = Infinity, right = -Infinity, top = Infinity, bottom = -Infinity;
            for (const r of all) {
                left = Math.min(left, r.x);
                right = Math.max(right, r.x + r.width);
                top = Math.min(top, r.y);
                bottom = Math.max(bottom, r.y + r.height);
            }
            return { left, right, top, bottom };
        }

        // Where does THIS tab (parent) sit in world space? Always its own rect.
        function getParentWorldRect() {
            return getParentRect();
        }

        // === Ball Initialization - guaranteed non-zero velocity ===
        function makeVelocity() {
            let vx, vy;
            do {
                vx = (Math.random() - 0.5) * 12;
                vy = (Math.random() - 0.5) * 12;
            } while (Math.abs(vx) < 3 || Math.abs(vy) < 3);
            return { vx, vy };
        }
        const vel = makeVelocity();
        const ball = new Ball(
            window.screenX + window.innerWidth / 2,
            window.screenY + window.innerHeight / 2,
            vel.vx,
            vel.vy,
            20
        );

        // === AcrossTabs Setup ===
        const AcrossTabsParent = AcrossTabs.default ? AcrossTabs.default.Parent : AcrossTabs.Parent;
        const tabManager = new AcrossTabsParent({
            onReady: () => console.log('Parent ready, tabId:', TAB_ID),
            onChildCommunication: (message, tabInfo) => {
                if (!message) return;
                if (message.type === 'window') {
                    // child reports its real screen rect + whether attached
                    tabs[message.tab.id] = message.tab;
                }
            },
        });

        document.getElementById('createTabButton').addEventListener('click', () => {
            tabManager.openNewTab({ url: 'pages/child.html' });
        });

        // === Game Loop ===
        function loop() {
            tabs[TAB_ID] = getMyTab();
            const bounds = getWorldBounds();
            ball.update(bounds);
            ball.draw();

            // Send ball + parent rect to children so they can resolve their
            // own world rectangle (attached vs detached).
            tabManager.broadCastAll({
                type: 'ball',
                ball: { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy, radius: ball.radius },
                parentRect: getParentWorldRect(),
            });

            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
